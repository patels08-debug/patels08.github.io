const STORAGE_KEY = 'german-a2-sprint-v1';
const startDate = new Date('2026-06-08');

function loadState() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return JSON.parse(stored);
  } catch (e) {}
  return {
    tasks: {},
    vocab: {},
    quizScores: {},
    writingEntries: [],
    currentDay: 1,
    streak: 0,
    lastActivityDate: null,
    flashcardIndex: 0,
    selectedTheme: Object.keys(vocabulary)[0]
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Save failed', e);
  }
}

let state = loadState();

function getCurrentDay() {
  const now = new Date();
  const diff = Math.floor((now - startDate) / (1000 * 60 * 60 * 24)) + 1;
  return Math.max(1, Math.min(21, diff));
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastActivityDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastActivityDate === yesterday) {
    state.streak++;
  } else if (state.lastActivityDate !== today) {
    state.streak = 1;
  }
  state.lastActivityDate = today;
  saveState();
}

function countLearnedWords() {
  return Object.values(state.vocab).filter(v => v.level >= 2).length;
}

function countTasksDone() {
  return Object.values(state.tasks).filter(t => t === true).length;
}

function getTotalTasks() {
  return dailyPlan.reduce((sum, day) => sum + day.tasks.length, 0);
}

function updateHeaderStats() {
  const todayNum = getCurrentDay();
  document.getElementById('current-day').textContent = `${todayNum} / 21`;
  document.getElementById('words-stat').textContent = countLearnedWords();
  document.getElementById('streak-stat').textContent = `${state.streak}🔥`;
  const done = countTasksDone();
  const total = getTotalTasks();
  document.getElementById('tasks-stat').textContent = `${done}/${total}`;
  document.getElementById('overall-progress').style.width = `${(done / total) * 100}%`;
}

    "Find a German song you like and learn the chorus by heart. Music sticks faster than flashcards.",
    "Review yesterday's words BEFORE learning new ones. Spaced repetition wins.",
    "Today, try the Perfekt tense out loud: tell yourself what you did this morning.",
    "Read a German news headline 3 times: once for gist, once for grammar, once aloud.",
    "Practice numbers and dates in German while doing routine tasks (time, prices, dates).",
    "Find a Tandem/HelloTalk partner today. Real conversation beats 100 flashcards.",
    "Record yourself speaking for 2 minutes. Listen back. Note one thing to improve.",
    "Try to think in German for 10 minutes today — even if it's just simple sentences.",
    "Take notes from your work meetings in German today (just keywords). Bridge work + learning.",
    "Today: only weil, dass, wenn, ob clauses. Master the verb-at-end pattern.",
    "Practice 'meinen Meinung nach...' (in my opinion) — A2 examiners love opinion phrases.",
    "Watch a 10-min YouTube clip with German subtitles only. No English. Trust the immersion.",
    "Review the perfekt list aloud — make it automatic, like a song chorus.",
    "Write an email in German today (real or fake — a complaint, an RSVP, a thank-you).",
    "Tomorrow is the mock exam. Tonight: skim all grammar, don't cram new words.",
    "Today's the mock exam — relax, breathe, and remember: A2 is communication, not perfection."
  ];
  return tips[Math.min(day - 1, tips.length - 1)];
}

function toggleTask(id) {
  state.tasks[id] = !state.tasks[id];
  saveState();
  updateStreak();
  updateHeaderStats();
  renderToday();
}

function renderPlan() {
  const dayButtons = dailyPlan.map((d, i) => {
    const todayNum = getCurrentDay();
    const isCurrent = state.currentDay === d.day;
    const isToday = todayNum === d.day;
    const allDone = d.tasks.every(t => state.tasks[t.id]);
    return `<button class="day-button ${isCurrent ? 'active' : ''} ${allDone ? 'done' : ''} ${isToday ? 'today' : ''}" onclick="selectDay(${d.day})">${d.day}</button>`;
  }).join('');

  const selectedDay = dailyPlan.find(d => d.day === state.currentDay) || dailyPlan[0];
  const tasksHtml = selectedDay.tasks.map(task => {
    const done = state.tasks[task.id] === true;
    return `
      <div class="task ${done ? 'done' : ''}" onclick="toggleTask('${task.id}')">
        <input type="checkbox" ${done ? 'checked' : ''} onclick="event.stopPropagation();toggleTask('${task.id}')">
        <div class="task-content">
          <div class="task-label">${task.label}</div>
          <div class="task-meta">⏱️ ${task.min} min</div>
        </div>
      </div>
    `;
  }).join('');

  content.innerHTML = `
    <div class="card">
      <h2>🗓️ Full 21-Day Plan</h2>
      <p>Click any day to see its tasks. The accent border shows today.</p>
      <div class="day-nav">${dayButtons}</div>
    </div>

    <div class="card">
      <span class="week-badge">Week ${selectedDay.week}</span>
      <h2 style="margin-top: 12px;">${selectedDay.title}</h2>
      <p><strong>Focus:</strong> ${selectedDay.focus}</p>
      <h3>Tasks</h3>
      ${tasksHtml}
    </div>

    <div class="card">
      <h2>📊 Week Overview</h2>
      ${renderWeekOverview()}
    </div>
  `;
}

function renderWeekOverview() {
  let html = '';
  for (let w = 1; w <= 3; w++) {
    const days = dailyPlan.filter(d => d.week === w);
    const totalTasks = days.reduce((sum, d) => sum + d.tasks.length, 0);
    const doneTasks = days.reduce((sum, d) => sum + d.tasks.filter(t => state.tasks[t.id]).length, 0);
    const pct = totalTasks ? (doneTasks / totalTasks) * 100 : 0;
    html += `
      <div style="margin-bottom: 12px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
          <strong>Week ${w}</strong>
          <span>${doneTasks}/${totalTasks} tasks</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
    `;
  }
  return html;
}

function selectDay(day) {
  state.currentDay = day;
  saveState();
  renderPlan();
}

function renderVocab() {
  const themes = Object.keys(vocabulary);
  if (!themes.includes(state.selectedTheme)) state.selectedTheme = themes[0];
  const themeChips = themes.map(t =>
    `<div class="theme-chip ${t === state.selectedTheme ? 'active' : ''}" onclick="selectTheme('${t}')">${t} (${vocabulary[t].length})</div>`
  ).join('');

  const words = vocabulary[state.selectedTheme];
  const idx = Math.min(state.flashcardIndex, words.length - 1);
  const word = words[idx];
  const vocabKey = `${state.selectedTheme}::${word.de}`;
  const vocabData = state.vocab[vocabKey] || { level: 0 };

  // Vocabulary table
  const tableRows = words.map((w, i) => {
    const key = `${state.selectedTheme}::${w.de}`;

    return `<tr>
      <td>${w.de}</td>
      <td>${w.en}</td>
      <td style="color: var(--accent);">${w.es || '—'}</td>
      <td style="font-style: italic; color: var(--text-muted);">${w.ex || ''}</td>

  }).join('');

  content.innerHTML = `
    <div class="card">
      <h2>📚 Vocabulary Flashcards</h2>
      <p>${countLearnedWords()} words learned out of ${Object.values(vocabulary).flat().length} total. Tap themes to switch.</p>
      <div class="theme-selector">${themeChips}</div>
    </div>

    <div class="card">
      <div class="flashcard-progress">
        <span>Card ${idx + 1} of ${words.length}</span>
        <span>Level: ${vocabData.level}/5</span>
      </div>
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div id="flashcard-front" class="flashcard-front">${word.de}</div>
        <div id="flashcard-back" class="flashcard-back" style="display:none;">
          <div style="display: flex; flex-direction: column; gap: 8px; align-items: center;">
            <div style="display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; justify-content: center;">
              <span style="font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">🇬🇧 EN</span>
              <span style="color: var(--text);">${word.en}</span>
            </div>
            <div style="display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; justify-content: center;">
              <span style="font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">🇪🇸 ES</span>
              <span style="color: var(--accent);">${word.es || '—'}</span>
            </div>
          </div>
          ${word.ex ? `<div style="font-size: 14px; color: var(--text-muted); margin-top: 16px; font-style: italic;">"${word.ex}"</div>` : ''}
        </div>
        <div class="flashcard-hint">Tap to flip</div>
      </div>
      <div class="flashcard-actions">
        <button class="button ghost" onclick="prevCard()">← Prev</button>
        <button class="button" style="background: var(--error)" onclick="rateCard(0)">😖 Again</button>
        <button class="button" style="background: var(--warning)" onclick="rateCard(2)">🤔 Hard</button>
        <button class="button secondary" onclick="rateCard(3)">👍 Good</button>
        <button class="button" style="background: var(--success)" onclick="rateCard(5)">⭐ Easy</button>
        <button class="button ghost" onclick="nextCard()">Next →</button>
      </div>
    </div>

    <details>
      <summary>📋 Full vocabulary list for this theme (${words.length} words)</summary>
      <div style="overflow-x: auto; margin-top: 12px;">
        <table class="vocab-table">
          <thead><tr><th>Deutsch</th><th>🇬🇧 English</th><th>🇪🇸 Español</th><th>Beispiel</th><th>Status</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </details>
  `;
}

function selectTheme(theme) {
  state.selectedTheme = theme;
  state.flashcardIndex = 0;
  saveState();
  renderVocab();
}

function flipCard() {
  const front = document.getElementById('flashcard-front');
  const back = document.getElementById('flashcard-back');
  if (front.style.display === 'none') {
    front.style.display = 'block';
    back.style.display = 'none';
  } else {
    front.style.display = 'none';
    back.style.display = 'block';
  }
}

function rateCard(rating) {
  const words = vocabulary[state.selectedTheme];
  const word = words[state.flashcardIndex];
  const key = `${state.selectedTheme}::${word.de}`;
  const current = state.vocab[key] || { level: 0 };
  if (rating === 0) current.level = Math.max(0, current.level - 1);
  else if (rating === 2) current.level = Math.max(0, current.level);
  else if (rating === 3) current.level = Math.min(5, current.level + 1);
  else if (rating === 5) current.level = Math.min(5, current.level + 2);
  state.vocab[key] = current;
  saveState();
  updateStreak();
  updateHeaderStats();
  nextCard();
}

function nextCard() {
  const words = vocabulary[state.selectedTheme];
  state.flashcardIndex = (state.flashcardIndex + 1) % words.length;
  saveState();
  renderVocab();
}

function prevCard() {
  const words = vocabulary[state.selectedTheme];
  state.flashcardIndex = (state.flashcardIndex - 1 + words.length) % words.length;
  saveState();
  renderVocab();
}

function renderGrammar() {
  const topics = Object.keys(grammarExercises);
  const selected = state.selectedGrammar || topics[0];

  const topicChips = topics.map(t =>
    `<div class="theme-chip ${t === selected ? 'active' : ''}" onclick="selectGrammar('${t}')">${t}</div>`
  ).join('');

  const exercises = grammarExercises[selected];
  const exercisesHtml = exercises.map((ex, i) => {
    const ansKey = `${selected}::${i}`;
    const userAns = state.quizScores[ansKey];
    const answered = userAns !== undefined;

    const optionsHtml = ex.options.map((opt, oi) => {
      let cls = 'quiz-option';
      if (answered) {
        if (oi === ex.a) cls += ' correct';
        else if (oi === userAns) cls += ' incorrect';
      }
      return `<button class="${cls}" onclick="answerQuiz('${selected}', ${i}, ${oi})">${String.fromCharCode(65 + oi)}. ${opt}</button>`;
    }).join('');

    return `
      <div class="quiz-question">
        <div class="quiz-prompt"><strong>${i + 1}.</strong> ${ex.q}</div>
        <div class="quiz-options">${optionsHtml}</div>
        ${answered ? `<div class="quiz-explanation"><strong>${userAns === ex.a ? '✅ Correct!' : '❌ Not quite.'}</strong> ${ex.ex}</div>` : ''}
      </div>
    `;
  }).join('');

  const answeredCount = exercises.filter((_, i) => state.quizScores[`${selected}::${i}`] !== undefined).length;
  const correctCount = exercises.filter((ex, i) => state.quizScores[`${selected}::${i}`] === ex.a).length;

  content.innerHTML = `
    <div class="card">
      <h2>📖 Grammar Drills</h2>
      <p>Pick a topic. Answers + explanations show after each click.</p>
      <div class="theme-selector">${topicChips}</div>
    </div>

    <div class="card">
      <h2>${selected}</h2>
      <p>Score: <strong>${correctCount}/${answeredCount}</strong> answered · ${exercises.length} total</p>
      ${renderGrammarRules(selected)}
      <hr>
      ${exercisesHtml}
      <button class="button ghost" style="margin-top: 12px;" onclick="resetQuiz('${selected}')">Reset this section</button>
    </div>
  `;
}

function renderGrammarRules(topic) {
  const rules = {
    "Accusative Case": `<h3>Quick rules</h3>
      <p><strong>Accusative = direct object</strong> ("the noun receiving the action")</p>
      <ul style="margin-left: 20px; color: var(--text-muted); font-size: 14px;">
        <li><strong>Articles:</strong> der → den, die → die, das → das, plural die → die</li>
        <li><strong>Pronouns:</strong> ich → mich, du → dich, er → ihn, sie → sie, wir → uns, ihr → euch, sie → sie</li>
        <li><strong>Triggers:</strong> Direct object verbs (haben, sehen, kaufen, essen, trinken)</li>
        <li><strong>Prepositions always acc:</strong> für, ohne, gegen, um, durch (FOGUD)</li>
      </ul>`,
    "Dative Case": `<h3>Quick rules</h3>
      <p><strong>Dative = indirect object</strong> ("the noun receiving the direct object")</p>
      <ul style="margin-left: 20px; color: var(--text-muted); font-size: 14px;">
        <li><strong>Articles:</strong> der → dem, die → der, das → dem, plural die → den (+n on noun)</li>
        <li><strong>Pronouns:</strong> ich → mir, du → dir, er → ihm, sie → ihr, es → ihm, wir → uns, ihr → euch, sie → ihnen</li>
        <li><strong>Dative verbs:</strong> helfen, geben, zeigen, gefallen, danken, antworten</li>
        <li><strong>Prepositions always dative:</strong> mit, nach, bei, von, aus, zu, seit (MNBVAZS)</li>
      </ul>`,
    "Perfekt (Past Tense)": `<h3>Quick rules</h3>
      <p><strong>Perfekt = haben/sein + past participle</strong> (used for spoken past)</p>
      <ul style="margin-left: 20px; color: var(--text-muted); font-size: 14px;">
        <li><strong>Most verbs:</strong> haben + Partizip II → "Ich habe gegessen"</li>
        <li><strong>Movement/state-change:</strong> sein + Partizip II → "Ich bin gegangen, gefahren, geworden"</li>
        <li><strong>Regular formation:</strong> ge- + stem + -t (kaufen → gekauft)</li>
        <li><strong>Irregular:</strong> ge- + (vowel change) + -en (sehen → gesehen, essen → gegessen)</li>
        <li><strong>No "ge-":</strong> verbs ending in -ieren (studieren → studiert) and inseparable prefixes (be-, ver-, ent-, er-)</li>
      </ul>`,
    "Subordinate Clauses": `<h3>Quick rules</h3>
      <p><strong>Subordinate clauses = verb at the END</strong></p>
      <ul style="margin-left: 20px; color: var(--text-muted); font-size: 14px;">
        <li><strong>Conjunctions:</strong> weil (because), dass (that), wenn (if/when), ob (whether), obwohl (although), während (while)</li>
        <li><strong>Word order:</strong> ", [conjunction] [subject] [other elements] [VERB AT END]."</li>
        <li><strong>Example:</strong> "Ich bleibe zu Hause, weil ich krank <u>bin</u>."</li>
        <li><strong>When sub clause starts the sentence:</strong> main clause flips → ", [VERB] [subject]..."</li>
        <li><strong>Example:</strong> "Wenn es regnet, <u>bleibe ich</u> zu Hause."</li>
      </ul>`,
    "Prepositions + Cases": `<h3>Quick rules</h3>
      <p><strong>Two-way prepositions:</strong> in, an, auf, unter, über, vor, hinter, neben, zwischen</p>
      <ul style="margin-left: 20px; color: var(--text-muted); font-size: 14px;">
        <li><strong>Motion (Wohin?):</strong> → ACCUSATIVE → "Ich gehe in die Schule"</li>
        <li><strong>Location (Wo?):</strong> → DATIVE → "Ich bin in der Schule"</li>
        <li><strong>Always accusative:</strong> für, ohne, gegen, um, durch, bis</li>
        <li><strong>Always dative:</strong> mit, nach, bei, von, aus, zu, seit, gegenüber</li>
      </ul>`,
    "Modal Verbs": `<h3>Quick rules</h3>
      <p><strong>Modal verbs:</strong> können, müssen, dürfen, sollen, wollen, mögen (möchten)</p>
      <ul style="margin-left: 20px; color: var(--text-muted); font-size: 14px;">
        <li><strong>Structure:</strong> [Subject] [modal verb] ... [main verb infinitive at end]</li>
        <li><strong>Example:</strong> "Ich <u>muss</u> heute arbeiten." / "Du <u>kannst</u> gut Deutsch sprechen."</li>
        <li><strong>Können:</strong> ich kann, du kannst, er kann, wir können, ihr könnt, sie können</li>
        <li><strong>Möchten</strong> (politely "would like"): ich möchte, du möchtest, er möchte...</li>
      </ul>`
  };
  return rules[topic] || '';
}

function selectGrammar(topic) {
  state.selectedGrammar = topic;
  saveState();
  renderGrammar();
}

function answerQuiz(topic, qi, ai) {
  const key = `${topic}::${qi}`;
  if (state.quizScores[key] !== undefined) return; // Already answered
  state.quizScores[key] = ai;
  saveState();
  updateStreak();
  updateHeaderStats();
  renderGrammar();
}

function resetQuiz(topic) {
  Object.keys(state.quizScores).forEach(k => {
    if (k.startsWith(topic + '::')) delete state.quizScores[k];
  });
  saveState();
  renderGrammar();
}

        <span id="word-count" style="color: var(--text-muted); font-size: 13px;">0 words</span>
      </div>
    </div>

    <div class="card">
      <h2>💡 Writing tips for A2</h2>
      <ul style="margin-left: 20px; color: var(--text-muted); font-size: 14px;">
        <li>Use simple sentences first, then connect with <em>und, aber, weil, dass</em></li>
        <li>Use Perfekt for past events: "Ich habe ... gemacht / Ich bin ... gegangen"</li>
        <li>Open with personal info: "Ich heiße ... und wohne in ..."</li>
        <li>Use opinion phrases: "Ich finde ...", "Meiner Meinung nach ...", "Ich glaube, dass ..."</li>
        <li>Time markers help structure: "zuerst, dann, danach, später, schließlich"</li>
      </ul>
    </div>

    <div class="card">
      <h2>📖 Past entries (${entries.length})</h2>
      ${entriesHtml || '<p>No entries yet — write your first one today!</p>'}
    </div>
  `;

  const textarea = document.getElementById('writing-input');
  textarea.addEventListener('input', () => {
    const words = textarea.value.split(/\s+/).filter(Boolean).length;
    document.getElementById('word-count').textContent = `${words} words`;
  });
}

function saveWriting(prompt) {
  const textarea = document.getElementById('writing-input');
  const text = textarea.value.trim();
  if (!text) {
    alert('Write something first!');
    return;
  }
  if (!state.writingEntries) state.writingEntries = [];
  state.writingEntries.push({
    date: new Date().toLocaleDateString('en-CA') + ' ' + new Date().toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit'}),
    prompt: prompt,
    text: text
  });
  saveState();
  updateStreak();
  updateHeaderStats();
  renderWriting();
}

function renderExam() {
  const examQuestions = [
    // Grammar mock (10 questions)
    { type: 'grammar', q: "Ich gebe ___ Mann das Buch.", options: ["der", "den", "dem", "die"], a: 2 },
    { type: 'grammar', q: "Sie ___ gestern nach Berlin gefahren.", options: ["hat", "ist", "war", "hatte"], a: 1 },
    { type: 'grammar', q: "Ich kann nicht kommen, ___ ich krank bin.", options: ["dass", "weil", "wenn", "ob"], a: 1 },
    { type: 'grammar', q: "Wir sehen ___ Film heute Abend.", options: ["der", "den", "dem", "das"], a: 1 },
    { type: 'grammar', q: "Past participle of 'sprechen' is:", options: ["gespracht", "gesprochen", "gespricht", "sprochen"], a: 1 },
    { type: 'grammar', q: "Ich helfe ___ (her).", options: ["sie", "ihr", "ihn", "ihre"], a: 1 },
    { type: 'grammar', q: "Past participle of 'studieren':", options: ["gestudiert", "studiert", "studierte", "gestudieren"], a: 1 },
    { type: 'grammar', q: "Wenn das Wetter schön ist, ___ wir spazieren.", options: ["gehen wir", "wir gehen", "wir gegangen", "gingen wir"], a: 0 },
    { type: 'grammar', q: "Er fährt mit ___ Auto.", options: ["das", "dem", "den", "der"], a: 1 },
    { type: 'grammar', q: "Ich möchte ___ (a) Kaffee, bitte.", options: ["ein", "einen", "einem", "eine"], a: 1 },
    // Reading comprehension (link to existing reading)
    { type: 'comprehension', refReading: 1, q: "Im Text 'Wochenende in München': Was hat der Freund zum Mittagessen bestellt?", options: ["Schweinebraten", "Würstchen mit Sauerkraut", "Salat", "Pizza"], a: 1 },
    { type: 'comprehension', refReading: 1, q: "Wo haben sie spazieren gegangen?", options: ["Im Marienplatz", "In der Frauenkirche", "Im Englischen Garten", "Im Hotel"], a: 2 },
    { type: 'comprehension', refReading: 2, q: "Im Text 'Im Supermarkt': Wie viel kostet der Einkauf?", options: ["22 Euro", "32 Euro", "42 Euro", "52 Euro"], a: 1 }
  ];

  const examAnswers = state.examAnswers || {};
  const submitted = state.examSubmitted === true;

  let correctCount = 0;
  if (submitted) {
    examQuestions.forEach((q, i) => {
      if (examAnswers[i] === q.a) correctCount++;
    });
  }

  const questionsHtml = examQuestions.map((q, i) => {
    const userAns = examAnswers[i];
    const optionsHtml = q.options.map((opt, oi) => {
      let cls = 'quiz-option';
      if (submitted) {
        if (oi === q.a) cls += ' correct';
        else if (oi === userAns) cls += ' incorrect';
      } else if (oi === userAns) {
        cls += ' selected';
      }
      return `<button class="${cls}" onclick="setExamAnswer(${i}, ${oi})" ${submitted ? 'disabled' : ''}>${String.fromCharCode(65 + oi)}. ${opt}</button>`;
    }).join('');

    return `
      <div class="quiz-question">
        <span class="badge ${q.type === 'grammar' ? 'accent' : 'warning'}">${q.type === 'grammar' ? 'Grammar' : 'Reading'}</span>
        <div class="quiz-prompt" style="margin-top: 8px;"><strong>${i + 1}.</strong> ${q.q}</div>
        <div class="quiz-options">${optionsHtml}</div>
      </div>
    `;
  }).join('');

  content.innerHTML = `
    <div class="card">
      <h2>📝 Mock A2 Exam</h2>
      <p>Take this at the end of your 3 weeks. Time yourself: 30 min for this section. Open Mock Exam day on June 28-29.</p>
      <div class="alert info">
        <strong>Format:</strong> 10 grammar + 3 reading comprehension questions. Pass = 9/13 (70%). Goal = 11/13 (85%) for solid A2.
      </div>
      ${submitted ? `<div class="alert ${correctCount >= 9 ? 'success' : 'warning'}"><strong>Your score: ${correctCount}/${examQuestions.length}</strong> (${Math.round((correctCount/examQuestions.length)*100)}%) — ${correctCount >= 11 ? '⭐ Solid A2!' : correctCount >= 9 ? '✅ Passing A2' : '📚 Keep practicing!'}</div>` : ''}
    </div>

    <div class="card">
      <h2>Questions</h2>
      ${questionsHtml}
      ${!submitted ? `<button class="button" style="margin-top: 16px; font-size: 16px; padding: 14px 24px;" onclick="submitExam()">✅ Submit exam</button>` : `<button class="button ghost" style="margin-top: 16px;" onclick="resetExam()">🔄 Reset & retake</button>`}
    </div>

    <div class="card">
      <h2>📋 Written Exam Part B: Free Writing (30 min)</h2>
      <p><strong>Task:</strong> Schreibe einen Brief oder eine E-Mail an einen Freund/eine Freundin (100-120 Wörter). Erzähle:</p>
      <ul style="margin-left: 20px; color: var(--text-muted);">
        <li>Wie es dir geht</li>
        <li>Was du letzte Woche gemacht hast (Perfekt!)</li>
        <li>Was du nächstes Wochenende planst</li>
        <li>Eine Frage an den Freund/die Freundin</li>
      </ul>
      <textarea id="exam-writing" rows="10" placeholder="Liebe/Lieber ..., wie geht es dir?..." style="margin-top: 8px;"></textarea>
      <div style="margin-top: 8px;">
        <span id="exam-word-count" style="color: var(--text-muted); font-size: 13px;">0 words</span>
        <button class="button secondary" style="margin-left: 8px;" onclick="saveExamWriting()">Save</button>
      </div>
    </div>

    <div class="card">
      <h2>🎤 Oral Exam Part C: Speaking (20 min)</h2>
      <p>Record yourself answering each task. Listen back and self-assess.</p>

      <h3>Task 1: Self-introduction (3 min)</h3>
      <p style="color: var(--text-muted);">Stell dich vor: Name, Alter, Wohnort, Beruf, Familie, Hobbys, warum du Deutsch lernst.</p>

      <h3>Task 2: Picture description (4 min)</h3>
      <p style="color: var(--text-muted);">Beschreibe ein Foto auf deinem Handy (was du siehst, wer da ist, wo es ist, wann es war).</p>

      <h3>Task 3: Q&A (5 min)</h3>
      <p style="color: var(--text-muted);">Beantworte spontan: Was hast du gestern gemacht? · Was sind deine Pläne fürs Wochenende? · Was ist dein Lieblingsessen? · Wo möchtest du im nächsten Urlaub hin? · Warum lernst du Deutsch?</p>

      <h3>Task 4: Plan something together (3 min)</h3>
      <p style="color: var(--text-muted);">Plane mit einem Partner (oder allein) ein Wochenende in Berlin: Was machen wir wann? Wo essen wir? Wie kommen wir hin?</p>

      <h3>Self-assessment scale (1-5)</h3>
      <ul style="margin-left: 20px; color: var(--text-muted); font-size: 14px;">
        <li><strong>Fluency:</strong> Sprach ich flüssig oder mit vielen Pausen?</li>
        <li><strong>Grammar:</strong> Wie viele Fehler hatte ich (Akk/Dat/Perfekt)?</li>
        <li><strong>Vocabulary:</strong> Habe ich vielfältige Wörter benutzt?</li>
        <li><strong>Pronunciation:</strong> Klang ich verständlich?</li>
      </ul>
      <p style="color: var(--accent); margin-top: 8px;"><strong>Pass = average 3+/5 across all four areas.</strong></p>
    </div>
  `;

  const textarea = document.getElementById('exam-writing');
  if (textarea) {
    textarea.value = state.examWriting || '';
    textarea.addEventListener('input', () => {
      const words = textarea.value.split(/\s+/).filter(Boolean).length;
      document.getElementById('exam-word-count').textContent = `${words} words ${words >= 100 ? '✅' : ''}`;
    });
    const initWords = textarea.value.split(/\s+/).filter(Boolean).length;
    document.getElementById('exam-word-count').textContent = `${initWords} words ${initWords >= 100 ? '✅' : ''}`;
  }
}

function setExamAnswer(qi, ai) {
  if (state.examSubmitted) return;
  if (!state.examAnswers) state.examAnswers = {};
  state.examAnswers[qi] = ai;
  saveState();
  renderExam();
}

function submitExam() {
  if (!state.examAnswers || Object.keys(state.examAnswers).length < 13) {
    if (!confirm('You have unanswered questions. Submit anyway?')) return;
  }
  state.examSubmitted = true;
  saveState();
  renderExam();
}

function resetExam() {
  if (!confirm('Reset exam? Your answers will be cleared.')) return;
  state.examAnswers = {};
  state.examSubmitted = false;
  saveState();
  renderExam();
}

function saveExamWriting() {
  const text = document.getElementById('exam-writing').value;
  state.examWriting = text;
  saveState();
  alert('Saved. Copy this to your tutor for review!');
}

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `german-a2-progress-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      state = JSON.parse(e.target.result);
      saveState();
      updateHeaderStats();
      const activeTab = document.querySelector('.tab.active').dataset.tab;
      renderTab(activeTab);
      alert('Data imported successfully!');
    } catch (err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirm('Reset ALL progress? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  updateHeaderStats();
  renderToday();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="today"]').classList.add('active');
}

// ========================================
// TIMER
// ========================================
let timerInterval = null;
let timerSeconds = 0;

function startTimer(minutes) {
  stopTimer();
  timerSeconds = minutes * 60;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      stopTimer();
      alert('⏰ Timer done! Great work — take a 5 min break.');
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
  const s = (timerSeconds % 60).toString().padStart(2, '0');
  const el = document.getElementById('timer-display');
  if (el) el.textContent = `${m}:${s}`;
}

// ========================================
// TAB ROUTING
// ========================================
function renderTab(tab) {
  stopTimer();
  switch(tab) {
    case 'today': renderToday(); break;
    case 'plan': renderPlan(); break;
    case 'vocab': renderVocab(); break;
    case 'grammar': renderGrammar(); break;
    case 'reading': renderReading(); break;
    case 'listening': renderListening(); break;
    case 'writing': renderWriting(); break;
    case 'speaking': renderSpeaking(); break;
    case 'exam': renderExam(); break;
    case 'resources': renderResources(); break;
    default: renderToday();
  }
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderTab(btn.dataset.tab);
  });
});

// ========================================
// INIT
// ========================================
updateHeaderStats();
renderToday();
